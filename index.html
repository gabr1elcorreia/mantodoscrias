<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manto dos Crias</title>

<link rel="icon" href="https://i.imgur.com/N2fRhFs.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;

/* BLOQUEAR SELEÇÃO */

-webkit-user-select:none;
-moz-user-select:none;
-ms-user-select:none;
user-select:none;

}

/* BODY */

body{

height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
radial-gradient(circle at 20% 20%, #3a3a3a 0%, transparent 55%),
radial-gradient(circle at 80% 80%, #2c2c2c 0%, transparent 55%),
linear-gradient(180deg,#2a2a2a,#1f1f1f);

overflow:hidden;
color:white;

}

/* BACKGROUND LIGHTS */

.light{

position:absolute;
width:700px;
height:700px;

background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);

filter:blur(140px);

animation:moveLight 18s infinite alternate ease-in-out;

}

.l1{
top:-200px;
left:-200px;
}

.l2{
bottom:-200px;
right:-200px;
animation-delay:6s;
}

.l3{
top:40%;
left:60%;
animation-delay:12s;
}

@keyframes moveLight{

0%{transform:translate(0,0) scale(1)}
50%{transform:translate(120px,-80px) scale(1.2)}
100%{transform:translate(-80px,120px) scale(1)}

}

/* CARD */

.container{

width:90%;
max-width:820px;

background:rgba(40,40,40,0.55);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.08);

border-radius:22px;

padding:70px 60px;

text-align:center;

box-shadow:0 40px 100px rgba(0,0,0,0.6);

position:relative;

}

/* LOGO HALO */

.logo-wrapper{

position:relative;
display:inline-block;
margin-bottom:25px;

}

.logo-wrapper::before{

content:"";

position:absolute;

width:180px;
height:180px;

background:radial-gradient(circle, rgba(255,255,255,0.25), transparent 70%);

top:50%;
left:50%;

transform:translate(-50%,-50%);

filter:blur(30px);

z-index:-1;

}

/* LOGO */

.logo{

width:110px;

animation:logoFloat 6s ease-in-out infinite;

filter:drop-shadow(0 0 15px rgba(255,255,255,0.35));

pointer-events:none;

}

@keyframes logoFloat{

0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}

}

/* TITLE */

h1{

font-size:clamp(42px,6vw,72px);

font-weight:900;

letter-spacing:-1px;

margin-bottom:12px;

}

/* SUBTITLE */

.subtitle{

color:#d0d0d0;

font-size:17px;

max-width:520px;
margin:auto;

margin-bottom:45px;

}

/* BUTTONS */

.buttons{

display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;

}

.btn{

padding:16px 42px;

border-radius:40px;

font-size:15px;

text-decoration:none;

color:white;

border:1px solid rgba(255,255,255,0.2);

background:rgba(20,20,20,0.7);

transition:0.25s;

min-width:160px;

}

.btn:hover{

background:white;
color:black;

transform:translateY(-4px);

box-shadow:0 0 20px rgba(255,255,255,0.4);

}

/* FOOTER */

footer{

margin-top:45px;

font-size:12px;

color:#aaa;

}

/* MOBILE */

@media(max-width:600px){

.container{

padding:45px 28px;

}

.logo{

width:90px;

}

h1{

font-size:38px;

}

.subtitle{

font-size:15px;

}

.buttons{

flex-direction:column;
gap:14px;

}

.btn{

width:100%;
padding:16px;
font-size:16px;

}

}

</style>

</head>

<body>

<div class="light l1"></div>
<div class="light l2"></div>
<div class="light l3"></div>

<div class="container">

<div class="logo-wrapper">
<img class="logo" src="https://i.imgur.com/N2fRhFs.png">
</div>

<h1>Manto dos Crias</h1>

<p class="subtitle">
O seu manto no melhor preço você encontra aqui!
</p>

<div class="buttons">

<a class="btn" href="https://whatsapp.mantodoscrias.com.br/">
Visitar Loja
</a>

<a class="btn" href="https://instagram.com/manto.dos.crias">
Instagram
</a>

<a class="btn" href="https://whatsapp.mantodoscrias.com.br/">
WhatsApp
</a>

</div>

<footer>

© 2026 Manto dos Crias

</footer>

</div>

<script>

/* BLOQUEAR CLIQUE DIREITO */

document.addEventListener("contextmenu", e => e.preventDefault());

/* BLOQUEAR TECLAS */

document.addEventListener("keydown", function(e){

if(e.key === "F12"){
e.preventDefault();
}

if(e.ctrlKey && e.key === "u"){
e.preventDefault();
}

if(e.ctrlKey && e.key === "c"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key === "I"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key === "C"){
e.preventDefault();
}

});

</script>

</body>

</html>
